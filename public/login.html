<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - Lucky Draw</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/" class="auth-logo-link">Lucky Draw</a>
      </div>
      <h1 class="auth-title">로그인</h1>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required />
        </div>
        <div class="form-error" id="formError" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">로그인</button>
      </form>

      <p class="auth-switch">
        계정이 없으신가요? <a href="/signup">회원가입</a>
      </p>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('formError');
      const submitBtn = document.getElementById('submitBtn');

      // Already logged in
      if (localStorage.getItem('token')) {
        window.location.href = '/dashboard';
        return;
      }

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      }

      function hideError() {
        errorEl.style.display = 'none';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showError('이메일과 비밀번호를 입력해주세요.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '로그인 중...';

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();

          if (!res.ok || !data.token) {
            showError(data.error || '로그인에 실패했습니다.');
            return;
          }

          localStorage.setItem('token', data.token);
          window.location.href = '/dashboard';
        } catch (err) {
          showError('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '로그인';
        }
      });
    })();
  </script>
</body>
</html>
